<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sharada — Reports Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Outfit:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/shared.css">
<style>
#app{display:none;flex:1;flex-direction:row;overflow:hidden;width:100%;}
.factive{border-color:var(--teal2)!important;background:var(--tl)!important;}
.clr-btn{font-size:11px;font-family:'DM Mono',monospace;color:var(--teal2);background:var(--tl);border:0.5px solid var(--teal2);border-radius:6px;padding:5px 12px;cursor:pointer;white-space:nowrap;}
.clr-btn:hover{background:var(--teal2);color:#fff;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="../shared/shared.js"></script>
</head>
<body>
<div id="app">
  <aside class="sb">
    <div class="sbb"><div class="sbn"><span class="ld"></span>Sharada</div><div class="sbs">Reports Board</div></div>
    <nav class="sbv" id="snav"></nav>
    <div class="sbm"><div class="mc">● Demo data</div></div>
    <div class="sbf" id="clk">--:--:--</div>
  </aside>
  <div class="main" id="bm"></div>
</div>
<script>
window._boardId = "reports";
let _allReps = [];
let _rfilt = { s:"", st:[], test:[], doc:[] };

document.addEventListener("DOMContentLoaded", () => { initBoard(); });
function initBoard() { render(); setInterval(render, 45000); }

function genReps() {
  const total = R(28, 52);
  const pendCount = R(3, 9);
  return Array.from({length:total}, (_, i) => {
    const isPend = i < pendCount;
    const tat = parseFloat((isPend ? (1.0 + Math.random() * 4.5) : (1.2 + Math.random() * 2.8)).toFixed(1));
    const status = isPend ? (tat > 4 ? "delayed" : "pending") : "delivered";
    return {
      id: `SD-${R(10000,99999)}`,
      name: NAMES[i % NAMES.length],
      age: R(18,72), gender: R(0,1)?"M":"F",
      test: TESTS[R(0,TESTS.length-1)],
      doctor: DOCS[R(0,DOCS.length-1)],
      collected: `${R(7,16)}:${String(R(0,59)).padStart(2,"0")}`,
      tat, status,
      abn: R(0,4) === 0
    };
  });
}

function getRepFiltered() {
  return _allReps.filter(r => {
    const q = _rfilt.s.toLowerCase();
    return (!q || r.name.toLowerCase().includes(q) || r.id.toLowerCase().includes(q))
      && (_rfilt.st.length===0   || _rfilt.st.includes(r.status))
      && (_rfilt.test.length===0 || _rfilt.test.includes(r.test))
      && (_rfilt.doc.length===0  || _rfilt.doc.includes(r.doctor));
  });
}

function anyRepFilterActive() {
  return !!(_rfilt.s || _rfilt.st.length || _rfilt.test.length || _rfilt.doc.length);
}

function render() {
  const days = slicerDays();
  _allReps = Array.from({length: Math.round(R(28,52)*days)}, (_,i) => {
    const isPend = i < Math.round(R(3,9)*days);
    const tat = parseFloat((isPend ? (1.0+Math.random()*4.5) : (1.2+Math.random()*2.8)).toFixed(1));
    const status = isPend ? (tat>4?"delayed":"pending") : "delivered";
    return {
      id:`SD-${R(10000,99999)}`, name:NAMES[i%NAMES.length], age:R(18,72), gender:R(0,1)?"M":"F",
      test:TESTS[R(0,TESTS.length-1)], doctor:DOCS[R(0,DOCS.length-1)],
      collected:`${R(7,16)}:${String(R(0,59)).padStart(2,"0")}`, tat, status, abn:R(0,4)===0
    };
  });
  window._repYst = Math.round(R(22,48)*days);

  const el = document.getElementById("bm");
  el.innerHTML = `
  <div class="bh">
    <div>
      <div class="bht">Reports Board</div>
      <div class="bhs">TAT tracking · Pathologist queue · Abnormal alerts · <strong style="color:var(--teal)">${slicerLabel()}</strong></div>
    </div>
    <div class="bhr"><span class="hbg hbd">Demo</span><span class="htm" id="htime"></span></div>
  </div>

  <div class="fb">
    <input type="text" placeholder="Search patient name or ID…" id="rp-s" oninput="repf()">
    ${buildMultiSelect("rp-st","Status",[{v:"pending",l:"Pending"},{v:"delayed",l:"Delayed (>4h)"},{v:"delivered",l:"Delivered"}],"repf")}
    ${buildMultiSelect("rp-test","Test",TESTS.map(t=>({v:t,l:t})),"repf")}
    ${buildMultiSelect("rp-doc","Doctor",DOCS.map(d=>({v:d,l:d})),"repf")}
    <div class="fsp"></div>
    <button class="clr-btn" onclick="clearRepFilters()">Clear filters</button>
    <div class="fsp"></div>
    ${buildSlicer("rp","render")}
  </div>

  <div id="rp-cband" class="cband"></div>

  <div class="bb">
    <div id="rp-kpi1" class="krow k3" style="margin-bottom:12px"></div>
    <div id="rp-kpi2" class="krow k3" style="margin-bottom:16px"></div>
    <div id="rp-alerts"></div>

    <div class="panel" style="margin-bottom:12px">
      <div class="ptl">Pathologist approval queue <span class="ptag" id="rp-pend-cnt"></span></div>
      <div class="th">
        <span style="width:85px">Report ID</span><span style="flex:1">Patient</span>
        <span style="width:120px">Test</span><span style="width:110px">Doctor</span>
        <span style="width:70px">Collected</span><span style="width:55px;text-align:right">TAT</span>
        <span style="width:75px;text-align:right">Status</span>
      </div>
      <div id="rp-pend-rows"></div>
    </div>

    <div class="g2" style="margin-bottom:12px">
      <div class="panel">
        <div class="ptl">TAT trend <span class="ptag">this week vs 4h target</span></div>
        <div class="cw t"><canvas id="c-tat"></canvas></div>
      </div>
      <div class="panel">
        <div class="ptl">TAT by test type <span class="ptag">avg hours</span></div>
        <div class="cw t"><canvas id="c-tt"></canvas></div>
      </div>
    </div>

    <div class="panel">
      <div class="ptl">Recently delivered <span class="ptag" id="rp-del-cnt"></span></div>
      <div class="th">
        <span style="width:85px">ID</span><span style="flex:1">Patient</span>
        <span style="width:120px">Test</span><span style="width:110px">Doctor</span>
        <span style="width:70px">Collected</span><span style="width:55px;text-align:right">TAT</span>
        <span style="width:80px;text-align:right">Status</span>
      </div>
      <div id="rp-del-rows"></div>
    </div>
  </div>`;

  // Charts use full unfiltered data
  const tatLabels = slicerChartLabels();
  const tatByDay = tatLabels.map((_,i) => i===tatLabels.length-1 ? parseFloat((_allReps.reduce((a,r)=>a+r.tat,0)/_allReps.length).toFixed(1)) : parseFloat((3.5+Math.random()*1.0).toFixed(1)));
  lineChart("c-tat", tatLabels, [
    {label:"Avg TAT", data:tatByDay, borderColor:"#0A5548", backgroundColor:"rgba(10,85,72,.08)", fill:true},
    {label:"4h target", data:tatLabels.map(()=>4), borderColor:"#E24B4A", borderWidth:1.5, borderDash:[4,4], pointRadius:0}
  ], {yMin:0, yMax:6, yFmt:v=>v+"h"});

  const tatByTest = TESTS.slice(0,7).map(t=>({name:t, tat:(1.8+Math.random()*2.5).toFixed(1)})).sort((a,b)=>b.tat-a.tat);
  barChart("c-tt", tatByTest.map(t=>t.name), tatByTest.map(t=>parseFloat(t.tat)), "#C98420", {yFmt:v=>v+"h", yMin:0, yMax:6});

  renderRepDynamic(getRepFiltered());

}

function renderRepDynamic(reps) {
  const total    = reps.length;
  const allTotal = _allReps.length;
  const yst      = window._repYst || 35;
  const isFiltered = anyRepFilterActive();

  const pending   = reps.filter(r => r.status === "pending");
  const delayed   = reps.filter(r => r.status === "delayed");
  const delivered = reps.filter(r => r.status === "delivered");
  const abnReps   = reps.filter(r => r.abn);

  // TAT compliance from actual data
  const tatCompliant = reps.filter(r => r.tat <= 4);
  const tatPct = total > 0 ? Math.round(tatCompliant.length / total * 100) : 100;
  const avgTAT = total > 0
    ? (reps.reduce((a,r)=>a+r.tat,0)/total).toFixed(1)
    : "0.0";

  const allDelivered = _allReps.filter(r=>r.status==="delivered").length;
  const dp = allDelivered - yst;

  // Context band
  document.getElementById("rp-cband").innerHTML = `
    <span><strong>${pending.length}</strong> pending · <strong>${delayed.length}</strong> delayed</span>
    <span class="ctx-sep">·</span>
    <span>Avg TAT <strong>${avgTAT}h</strong></span>
    <span class="ctx-sep">·</span>
    <span>TAT compliance <strong>${tatPct}%</strong></span>
    <span class="ctx-sep">·</span>
    <span><strong>${delivered.length}</strong> delivered${isFiltered?` (filtered)`:""}  · <strong>${abnReps.length}</strong> abnormal</span>
    ${delayed.length>0?`<span class="ctx-sep">·</span><span style="color:var(--red);font-weight:600">⚠ ${delayed.length} over 4h limit</span>`:""}
    ${isFiltered?`<span class="ctx-sep">·</span><span style="color:var(--blue)">Filters active</span>`:""}`;

  // KPI row 1
  document.getElementById("rp-kpi1").innerHTML =
    kpi("Pending approval", pending.length+delayed.length,
      `${pending.length} pending · ${delayed.length} delayed >4h`,
      (pending.length+delayed.length)>5?"wn":(pending.length+delayed.length)>0?"fl":"ok",
      (pending.length+delayed.length)>5?"↓ Action needed":(pending.length+delayed.length)>0?"→ In queue":"✓ All clear","am",
      {color:(pending.length+delayed.length)>5?"var(--red)":(pending.length+delayed.length)>0?"var(--amb)":"var(--grn)"})
    + kpi("Delivered today", delivered.length,
      `${total>0?Math.round(delivered.length/total*100):0}% of ${isFiltered?"shown":"all"} reports`,
      "up", `${dp>=0?"↑":"↓"} ${Math.abs(dp)} vs yesterday`,"gn",{color:"var(--grn)"})
    + kpi("Avg turnaround", avgTAT+"h",
      "sample collection to delivery",
      parseFloat(avgTAT)<3.5?"up":parseFloat(avgTAT)<4?"ok":"wn",
      parseFloat(avgTAT)<4?"✓ Under 4h limit":"↓ Approaching limit","tl",
      {color:parseFloat(avgTAT)<3.5?"var(--teal)":parseFloat(avgTAT)<4?"var(--amb)":"var(--red)"});

  // KPI row 2
  document.getElementById("rp-kpi2").innerHTML =
    kpi("TAT compliance", tatPct+"%",
      `${tatCompliant.length} of ${total} within 4h`,
      tatPct>=90?"up":tatPct>=80?"ok":"wn",
      tatPct>=90?"✓ Excellent":tatPct>=80?"→ Good":"↓ Needs attention","gn",
      {color:tatPct>=90?"var(--grn)":tatPct>=80?"var(--teal)":"var(--red)",prog:tatPct,progColor:tatPct>=90?"#1D9E75":tatPct>=80?"#EF9F27":"#E24B4A"})
    + kpi("Delayed reports", delayed.length,
      delayed.length>0?"over 4h — follow up now":"no delays","dn",
      delayed.length===0?"✓ None delayed":"→ Follow up now","rd",
      {color:delayed.length>0?"var(--red)":"var(--grn)"})
    + kpi("Abnormal flags", abnReps.length,
      abnReps.length>0?"outside reference range — alerted":"all values normal","wn",
      abnReps.length>0?"→ Doctors notified":"✓ All normal","am",
      {color:abnReps.length>0?"var(--amb)":"var(--grn)"});

  // Alerts
  let alertsHtml = "";
  if (delayed.length > 0) {
    alertsHtml += `<div class="sl">Delayed reports — over 4h limit</div><div style="margin-bottom:14px">
      ${delayed.slice(0,3).map(r=>`<div class="ac acr"><div class="ado"></div><div>
        <div class="att">${r.name} · ${r.test} — TAT ${r.tat}h (limit 4h)</div>
        <div class="abt">Referred by ${r.doctor} · Collected ${r.collected} · Age ${r.age}y ${r.gender}</div>
      </div></div>`).join("")}
      ${delayed.length>3?`<div class="ac acb"><div class="ado"></div><div>
        <div class="att">+${delayed.length-3} more delayed</div>
      </div></div>`:""}
    </div>`;
  }
  if (abnReps.length > 0) {
    alertsHtml += `<div class="sl">Critical value alerts</div><div style="margin-bottom:14px">
      ${abnReps.slice(0,3).map(r=>`<div class="ac acr"><div class="ado"></div><div>
        <div class="att">${r.name} · ${r.test} — value outside reference range</div>
        <div class="abt">Referred by ${r.doctor} · Doctor alerted via WhatsApp · TAT: ${r.tat}h</div>
      </div></div>`).join("")}
      ${abnReps.length>3?`<div class="ac acb"><div class="ado"></div><div>
        <div class="att">+${abnReps.length-3} more abnormal flags</div>
        <div class="abt">See tables below</div>
      </div></div>`:""}
    </div>`;
  }
  document.getElementById("rp-alerts").innerHTML = alertsHtml;

  // Pending queue
  const pendAll = [...delayed, ...pending].sort((a,b) => b.tat - a.tat);
  document.getElementById("rp-pend-cnt").textContent = pendAll.length ? `${pendAll.length} awaiting` : "queue clear";
  document.getElementById("rp-pend-rows").innerHTML = pendAll.length
    ? pendAll.map(r=>`<div class="tr">
        <span style="width:85px;font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)">${r.id}</span>
        <span style="flex:1"><strong>${r.name}</strong> <span style="font-size:10px;color:var(--ink3)">${r.age}y ${r.gender}</span>${r.abn?' <span class="pill pc">!</span>':""}</span>
        <span style="width:120px;font-size:11px;color:var(--ink3)">${r.test}</span>
        <span style="width:110px;font-size:10px;color:var(--ink3)">${r.doctor}</span>
        <span style="width:70px;font-family:'DM Mono',monospace;font-size:10px">${r.collected}</span>
        <span style="width:55px;text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:${r.tat>4?"var(--red)":"var(--ink3)"}">${r.tat}h</span>
        <span style="width:75px;text-align:right"><span class="pill ${r.status==="delayed"?"pde":"pp"}">${r.status==="delayed"?"Delayed":"Pending"}</span></span>
      </div>`).join("")
    : `<div style="padding:14px 0;color:var(--ink3);font-size:12px;text-align:center">✓ Queue is clear${isFiltered?" for this filter":""}</div>`;

  // Delivered table
  document.getElementById("rp-del-cnt").textContent = `${delivered.length} report${delivered.length!==1?"s":""}`;
  document.getElementById("rp-del-rows").innerHTML = delivered.length
    ? delivered.slice(0,10).map(r=>`<div class="tr">
        <span style="width:85px;font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)">${r.id}</span>
        <span style="flex:1"><strong>${r.name}</strong></span>
        <span style="width:120px;font-size:11px;color:var(--ink3)">${r.test}</span>
        <span style="width:110px;font-size:10px;color:var(--ink3)">${r.doctor}</span>
        <span style="width:70px;font-family:'DM Mono',monospace;font-size:10px">${r.collected}</span>
        <span style="width:55px;text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:${r.tat<4?"var(--grn)":"var(--amb)"}">${r.tat}h</span>
        <span style="width:80px;text-align:right"><span class="pill pd">Delivered</span></span>
      </div>`).join("")
    : `<div style="padding:14px 0;color:var(--ink3);font-size:12px;text-align:center">No delivered reports match filters</div>`;

}

function repf() {
  _rfilt.s    = document.getElementById("rp-s")?.value || "";
  _rfilt.st   = getMSVals("rp-st");
  _rfilt.test = getMSVals("rp-test");
  _rfilt.doc  = getMSVals("rp-doc");
  renderRepDynamic(getRepFiltered());
}

function clearRepFilters() {
  _rfilt.s = "";
  const e=document.getElementById("rp-s"); if(e){ e.value=""; e.classList.remove("factive"); }
  clearMSBatch(["rp-st","rp-test","rp-doc"]);
  repf();
}
</script>
</body>
</html>
