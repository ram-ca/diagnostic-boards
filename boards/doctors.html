<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sharada — Doctor Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Outfit:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/shared.css">
<style>
.lcard{background:var(--white);border:0.5px solid var(--brd);border-radius:16px;padding:36px;width:340px;text-align:center;}
.lnm{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:var(--teal);letter-spacing:.06em;margin-bottom:3px;}
.lsb{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
.lro{display:flex;gap:5px;margin:18px 0 12px;justify-content:center;}
.rb{font-size:11px;padding:5px 12px;border-radius:18px;border:0.5px solid var(--brd);cursor:pointer;background:transparent;color:var(--ink3);font-family:'Outfit',sans-serif;}
.rb.on{background:var(--teal);color:#fff;border-color:var(--teal);}
.lpd{display:flex;gap:7px;justify-content:center;margin:12px 0 16px;}
.dot{width:12px;height:12px;border-radius:50%;background:var(--cream);border:1.5px solid var(--brd);transition:all .15s;}
.dot.f{background:var(--teal);border-color:var(--teal);}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.pk{background:var(--cream);border:0.5px solid var(--brd);border-radius:9px;padding:12px;font-size:18px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .1s;color:var(--ink);}
.pk:hover{background:var(--tl);border-color:var(--teal);}.pk:active{transform:scale(.96);}
.lerr{font-size:12px;color:var(--red);height:18px;margin-bottom:4px;}
.lhint{font-size:10px;color:var(--ink3);}
#app{display:none;flex:1;flex-direction:row;overflow:hidden;width:100%;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="../shared/shared.js"></script>
</head>
<body>

<div id="app">
  <aside class="sb">
    <div class="sbb"><div class="sbn"><span class="ld"></span>Sharada</div><div class="sbs">Doctor Board</div></div>
    <nav class="sbv" id="snav"></nav>
    <div class="sbm"><div class="mc">● Demo data</div></div>
    <div class="sbf" id="clk">--:--:--</div>
  </aside>
  <div class="main" id="bm"></div>
</div>
<script>
window._boardId="doctors";
let _dp="week";
document.addEventListener("DOMContentLoaded",()=>{
  initBoard();
});
function initBoard(){ render(); setInterval(render,60000); }

const DOCTOR_LIST=[
  {name:"Dr Ravi Shankar",spec:"General Physician",base:18,trend:"up",wks:[14,16,18,20,22,19,21,24],ph:"+91 98712 34561",init:"RS"},
  {name:"Dr Priya Reddy",spec:"Gynaecologist",base:14,trend:"up",wks:[10,12,14,15,16,14,16,18],ph:"+91 98712 34562",init:"PR"},
  {name:"Dr Suresh Nair",spec:"Endocrinologist",base:12,trend:"flat",wks:[11,12,13,12,11,12,12,12],ph:"+91 98712 34563",init:"SN"},
  {name:"Dr Anitha Rao",spec:"Cardiologist",base:10,trend:"down",wks:[12,11,10,9,8,10,9,7],ph:"+91 98712 34564",init:"AR"},
  {name:"Dr Kiran Mehta",spec:"General Physician",base:9,trend:"up",wks:[7,8,9,10,9,11,10,12],ph:"+91 98712 34565",init:"KM"},
  {name:"Dr Meena Lakshmi",spec:"Diabetologist",base:7,trend:"flat",wks:[6,7,8,7,6,8,7,7],ph:"+91 98712 34566",init:"ML"},
  {name:"Dr Venkat Rao",spec:"General Physician",base:4,trend:"down",wks:[8,7,6,5,4,5,4,3],ph:"+91 98712 34567",init:"VR"},
  {name:"Dr Santha Kumari",spec:"Paediatrician",base:3,trend:"down",wks:[5,4,3,4,3,2,3,2],ph:"+91 98712 34568",init:"SK"},
  {name:"Dr Priya Nair",spec:"Dermatologist",base:5,trend:"up",wks:[3,4,5,6,5,7,6,8],ph:"+91 98712 34569",init:"PN"},
  {name:"Dr Ramesh Gupta",spec:"Orthopaedics",base:4,trend:"flat",wks:[4,5,4,3,5,4,4,5],ph:"+91 98712 34570",init:"RG"},
];

function render(){
  const el=document.getElementById("bm");
  const mult=_dp==="week"?1:4.3;
  const docs=DOCTOR_LIST.map((d,i)=>{
    const refs=Math.round(d.base*mult*(0.8+Math.random()*.4));
    const prev=Math.round(d.base*mult*(0.7+Math.random()*.5));
    return{...d,rank:i+1,refs,prev,revenue:refs*R(380,560),delta:parseFloat(pct(refs,prev))};
  });
  const total=docs.reduce((a,d)=>a+d.refs,0);
  const totalRev=docs.reduce((a,d)=>a+d.revenue,0);
  const atRisk=docs.filter(d=>d.trend==="down");
  const pLabel=_dp==="week"?"This week":"This month";

  el.innerHTML=`
  <div class="bh">
    <div><div class="bht">Doctor board</div><div class="bhs">Referral tracking, weekly trends and visit priority alerts</div></div>
    <div class="bhr">
      <div class="ptog">
        <button class="ptb ${_dp==="week"?"on":""}" onclick="_dp='week';render()">Week</button>
        <button class="ptb ${_dp==="month"?"on":""}" onclick="_dp='month';render()">Month</button>
      </div>
    </div>
  </div>
  <div class="fb">
    <input type="text" placeholder="Search doctor name..." id="d-s" oninput="df()">
    <select id="d-sp" onchange="df()"><option value="">All specialities</option>${[...new Set(docs.map(d=>d.spec))].map(s=>`<option value="${s}">${s}</option>`).join("")}</select>
    <select id="d-tr" onchange="df()"><option value="">All trends</option><option value="up">Increasing ↑</option><option value="flat">Stable →</option><option value="down">Dropping ↓</option></select>
  </div>
  <div class="cband">
    <span><strong>${total}</strong> referrals ${pLabel.toLowerCase()}</span><span class="ctx-sep">·</span>
    <span>Revenue <strong>${fK(totalRev)}</strong></span><span class="ctx-sep">·</span>
    <span><strong>3</strong> new referrers this month</span><span class="ctx-sep">·</span>
    <span><strong>${atRisk.length}</strong> dropping — visit this week</span>
  </div>
  <div class="bb">
    <div class="krow k4" style="margin-bottom:12px">
      ${kpi("Total referrals",total,pLabel.toLowerCase()+" combined","up","↑ "+R(5,18)+"% vs prev","tl",{color:"var(--teal)"})}
      ${kpi("Revenue from doctors",fK(totalRev),pLabel.toLowerCase()+" from referrals","up","↑ "+R(4,14)+"%","gn",{color:"var(--grn)"})}
      ${kpi("Active doctors",docs.filter(d=>d.refs>0).length,"referred at least once","ok","✓ 3 new this month","bl")}
      ${kpi("At-risk doctors",atRisk.length,"referrals dropping >20%","dn","↓ Visit recommended","rd",{color:atRisk.length?"var(--red)":"var(--grn)"})}
    </div>
    <div class="krow k4" style="margin-bottom:16px">
      ${kpi("Top doctor",docs[0].init,docs[0].refs+" refs · "+docs[0].spec,"up","↑ Strongest","tl")}
      ${kpi("Avg per doctor",Math.round(total/docs.filter(d=>d.refs>0).length),"referrals per active doctor","fl","→ target 8+/week","")}
      ${kpi("Specialities covered","6 / 8","of target specialities","ok","→ Add ortho + neuro","bl")}
      ${kpi("Doctor loyalty",R(72,88)+"%","returning referrers from last month","ok","✓ Good retention","gn")}
    </div>
    ${atRisk.length?`
    <div class="sl">Visit priority — personal visit recommended this week</div>
    <div style="margin-bottom:14px">${atRisk.map(d=>`<div class="ac aca"><div class="ado"></div><div><div class="att">${d.name} · ${d.spec} — referrals dropping</div><div class="abt">8-week trend: ${d.wks.slice(-4).join("→")}. Down ${Math.abs(d.delta)}% vs previous period. Call or visit personally. ${d.ph}</div></div></div>`).join("")}</div>`:""}
    <div class="g2" style="margin-bottom:12px">
      <div class="panel">
        <div class="ptl">Referral leaderboard <span class="ptag">${pLabel.toLowerCase()}</span></div>
        <div class="th"><span style="width:22px">#</span><span style="flex:1">Doctor</span><span style="width:60px;text-align:right">Refs</span><span style="width:80px;text-align:right">Revenue</span><span style="width:55px;text-align:right">Δ prev</span><span style="width:55px;text-align:right">Trend</span></div>
        <div id="d-rows">
          ${docs.map((d,i)=>`<div class="tr" data-n="${d.name.toLowerCase()}" data-sp="${d.spec}" data-tr="${d.trend}"><span style="width:22px;font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)">${i+1}</span><span style="flex:1;display:flex;align-items:center;gap:6px"><span class="av" style="background:var(--tl);color:var(--teal);width:26px;height:26px;font-size:10px">${d.init}</span><span><strong>${d.name}</strong> <span style="font-size:10px;color:var(--ink3)">${d.spec}</span></span></span><span style="width:60px;text-align:right;font-family:'DM Mono',monospace">${d.refs}</span><span style="width:80px;text-align:right;font-size:11px">${fK(d.revenue)}</span><span style="width:55px;text-align:right;font-size:11px;color:${d.delta>0?"var(--grn)":d.delta<0?"var(--red)":"var(--ink3)"}">${d.delta>0?"+":""}${d.delta}%</span><span style="width:55px;text-align:right;font-size:11px;color:${d.trend==="up"?"var(--grn)":d.trend==="down"?"var(--red)":"var(--ink3)"}">${d.trend==="up"?"↑ up":d.trend==="down"?"↓ dn":"→ flat"}</span></div>`).join("")}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <div class="panel"><div class="ptl">8-week total referral trend</div><div class="cw"><canvas id="c-t"></canvas></div></div>
        <div class="panel"><div class="ptl">Revenue by doctor <span class="ptag">top 6</span></div><div class="cw"><canvas id="c-r"></canvas></div></div>
      </div>
    </div>
    <div class="panel">
      <div class="ptl">Weekly referrals per doctor <span class="ptag">last 8 weeks</span></div>
      <div class="cw t"><canvas id="c-w"></canvas></div>
    </div>
  </div>`;

  lineChart("c-t",["W1","W2","W3","W4","W5","W6","W7","W8"],[
    {label:"Total",data:[38,44,41,52,48,56,62,total],borderColor:"#0A5548",backgroundColor:"rgba(10,85,72,.08)",fill:true}
  ]);
  barChart("c-r",docs.slice(0,6).map(d=>d.init),docs.slice(0,6).map(d=>d.revenue),"#136658",{yFmt:v=>"₹"+(v/1000).toFixed(0)+"K"});
  mkChart("c-w","bar",{
    labels:["W1","W2","W3","W4","W5","W6","W7","W8"],
    datasets:DOCTOR_LIST.slice(0,5).map((d,i)=>({label:d.init,data:d.wks,backgroundColor:["rgba(10,85,72,.7)","rgba(19,102,88,.6)","rgba(201,132,32,.6)","rgba(24,95,165,.5)","rgba(83,74,183,.5)"][i],borderRadius:2}))
  },{legend:{display:true,labels:{font:{size:10},boxWidth:8,padding:6}}});
}
function df(){
  const s=(document.getElementById("d-s")?.value||"").toLowerCase();
  const sp=document.getElementById("d-sp")?.value||"";
  const tr=document.getElementById("d-tr")?.value||"";
  document.querySelectorAll("#d-rows .tr").forEach(r=>{
    r.style.display=((!s||(r.dataset.n||"").includes(s))&&(!sp||r.dataset.sp===sp)&&(!tr||r.dataset.tr===tr))?"":"none";
  });
}
</script>
</body>
</html>
