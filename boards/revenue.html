<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sharada — Revenue Board</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Outfit:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/shared.css">
<style>
#app{display:none;flex:1;flex-direction:row;overflow:hidden;width:100%;}
.doc-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--brd);}
.doc-row:last-child{border-bottom:none;}
.doc-bar-wrap{flex:1;background:var(--cream);border-radius:3px;height:5px;overflow:hidden;}
.doc-bar{height:100%;border-radius:3px;}
.factive{border-color:var(--teal2)!important;background:var(--tl)!important;}
.cat-total{margin-top:10px;padding:8px 12px;background:var(--tl);border-radius:6px;font-size:11px;color:var(--teal);display:flex;justify-content:space-between;align-items:center;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="../shared/shared.js"></script>
</head>
<body>
<div id="app">
  <aside class="sb">
    <div class="sbb"><div class="sbn"><span class="ld"></span>Sharada</div><div class="sbs">Revenue Board</div></div>
    <nav class="sbv" id="snav"></nav>
    <div class="sbm"><div class="mc">● Demo data</div></div>
    <div class="sbf" id="clk">--:--:--</div>
  </aside>
  <div class="main" id="bm"></div>
</div>
<script>
window._boardId="revenue";
let _catFilter="", _payFilter="";

const CAT_MAP={
  "Haematology":["CBC","ESR","Platelet Count"],
  "Hormone":["TSH","Vitamin D","HbA1c","Thyroid Profile"],
  "Biochemistry":["Lipid Profile","Blood Sugar","LFT","RFT","Serum Creatinine"],
  "Radiology":["USG Abdomen","X-Ray Chest","ECG"],
  "Microbiology":["Dengue NS1","Urine Routine"]
};

document.addEventListener("DOMContentLoaded",()=>{ initBoard(); });
function initBoard(){ render(); setInterval(render,45000); }

function rvCat(v){ _catFilter=v; renderFiltered(); }
function rvPay(v){ _payFilter=v; renderFiltered(); }

function render(){
  const el=document.getElementById("bm");
  const MONTHLY_TARGET=850000;
  const DAILY_TARGET=Math.round(MONTHLY_TARGET/26);
  const PATIENT_TARGET=55;
  const COSTS={Salaries:115000,Rent:40000,EMI:38000,Electricity:18000,Marketing:25000,Tech:5299};
  const totalFixed=Object.values(COSTS).reduce((a,b)=>a+b,0);

  const days=slicerDays();
  const pLabel=slicerLabel();
  const isDay=days===1;

  const base=Math.round(R(22000,40000)*days*(0.9+Math.random()*0.2));
  const prev=Math.round(R(18000,36000)*days*(0.9+Math.random()*0.2));
  const dp=pct(base,prev);

  const patients=Math.round(R(38,62)*days*(0.9+Math.random()*0.2));
  const avgTicket=Math.round(base/patients);

  const cashPct=R(38,45), upiPct=R(45,52), cardPct=100-cashPct-upiPct;
  const cash=Math.round(base*cashPct/100);
  const upi=Math.round(base*upiPct/100);
  const card=base-cash-upi;

  const fixedShare=Math.round(totalFixed*days/26);
  const variable=Math.round(base*0.25);
  const profit=base-variable-fixedShare;
  const margin=Math.round(profit/base*100);
  const costPerPt=Math.round((variable+fixedShare)/Math.max(patients,1));

  const monthSoFar=R(460000,670000);
  const tgtPct=Math.round(monthSoFar/MONTHLY_TARGET*100);
  const daysLeft=Math.max(1,30-new Date().getDate());
  const needed=Math.max(0,(MONTHLY_TARGET-monthSoFar)/daysLeft);
  const runRate=Math.round(base/days);
  const runRatePct=Math.round(runRate/DAILY_TARGET*100);
  const outstanding=R(1200,6800);

  const trendLabels=slicerChartLabels();
  const trendData=trendLabels.map(()=>isDay?R(600,4800):days<=7?R(18000,45000):R(18000,38000));
  const prevTrend=trendData.map(v=>Math.max(0,v+R(-5000,5000)));

  const testRevenue=[
    {t:"Vitamin D",   cat:"Hormone",     v:R(38000,58000)},
    {t:"CBC",         cat:"Haematology", v:R(28000,44000)},
    {t:"TSH",         cat:"Hormone",     v:R(22000,36000)},
    {t:"USG Abdomen", cat:"Radiology",   v:R(20000,35000)},
    {t:"Lipid Profile",cat:"Biochemistry",v:R(18000,30000)},
    {t:"HbA1c",       cat:"Hormone",     v:R(15000,26000)},
    {t:"LFT",         cat:"Biochemistry",v:R(12000,22000)},
    {t:"X-Ray Chest", cat:"Radiology",   v:R(10000,18000)},
    {t:"Blood Sugar",  cat:"Biochemistry",v:R(8000,16000)},
    {t:"Dengue NS1",  cat:"Microbiology",v:R(6000,12000)}
  ].sort((a,b)=>b.v-a.v);
  const maxTestRev=testRevenue[0].v;
  const totalTestRev=testRevenue.reduce((a,t)=>a+t.v,0);

  const docRevenue=DOCS.filter(d=>d!=="Walk-in").map(d=>({
    name:d.replace("Dr ",""),v:R(28000,98000),pts:R(9,30)
  })).sort((a,b)=>b.v-a.v);
  const maxDocRev=Math.max(...docRevenue.map(d=>d.v),1);
  const totalDocRev=docRevenue.reduce((a,d)=>a+d.v,0);

  el.innerHTML=`
  <div class="bh">
    <div>
      <div class="bht">Revenue Board</div>
      <div class="bhs">Collections · P&L · Run rate · Cost structure</div>
    </div>
    <div class="bhr">
      <span class="hbg hbd">₹${f(outstanding).replace("₹","")} pending</span>
      <span class="htm" id="htime"></span>
    </div>
  </div>

  <div class="fb">
    <select id="rv-cat" onchange="rvCat(this.value)">
      <option value="">All test categories</option>
      <option value="Haematology">Haematology</option>
      <option value="Hormone">Hormone</option>
      <option value="Biochemistry">Biochemistry</option>
      <option value="Radiology">Radiology</option>
      <option value="Microbiology">Microbiology</option>
    </select>
    <select id="rv-pay" onchange="rvPay(this.value)">
      <option value="">All payment modes</option>
      <option value="cash">Cash only</option>
      <option value="digital">Digital only</option>
    </select>
    <div class="fsp"></div>
    ${buildSlicer("rv","render")}
  </div>

  <div class="cband" id="rv-cband">
    <span><strong>${fK(base)}</strong> ${pLabel.toLowerCase()}</span><span class="ctx-sep">·</span>
    <span>${dp>0?"↑":"↓"}<strong>${Math.abs(dp)}%</strong> vs previous</span><span class="ctx-sep">·</span>
    <span>Avg ticket <strong>${f(avgTicket)}</strong></span><span class="ctx-sep">·</span>
    <span>Margin <strong>${margin>0?margin+"% profit":Math.abs(margin)+"% loss"}</strong></span><span class="ctx-sep">·</span>
    <span>Monthly <strong>${tgtPct}%</strong> · <strong>${daysLeft}</strong> days left</span>
  </div>

  <div class="bb">

    <div class="krow k4" style="margin-bottom:12px">
      ${kpi(pLabel+" revenue",fK(base),
        `gross collections · ${patients} patients`,
        dp>0?"up":"dn",`${dp>0?"↑":"↓"}${Math.abs(dp)}% vs previous`,"tl",{color:"var(--teal)"})}
      ${kpi("Net profit",fK(Math.abs(profit)),
        `margin ${margin}% · after all costs`,
        profit>0?"up":"dn",profit>0?"↑ Profitable":"↓ Loss making","gn",
        {color:profit>0?"var(--grn)":"var(--red)"})}
      ${kpi("Avg ticket size",f(avgTicket),
        `per patient · ${patients} visits`,
        avgTicket>550?"up":"fl",avgTicket>550?"↑ Good":"→ Can improve","bl")}
      ${kpi("Monthly target",tgtPct+"%",
        `${fK(monthSoFar)} of ${fK(MONTHLY_TARGET)} · ${daysLeft} days left`,
        tgtPct>=70?"ok":"wn",tgtPct>=70?"On track":"Needs push","tl",
        {color:tgtPct>=70?"var(--teal)":"var(--amb)",prog:Math.min(tgtPct,100)})}
    </div>

    <div id="rv-kpi2" class="krow k4" style="margin-bottom:16px">
      ${kpi("Cash collected",fK(cash),
        `${cashPct}% of ${pLabel.toLowerCase()} · reconcile daily`,
        "fl","→ physical float","am")}
      ${kpi("UPI / Digital",fK(upi+card),
        `${upiPct+cardPct}% of ${pLabel.toLowerCase()} · auto-reconciled`,
        "up","↑ preferred mode","bl")}
      ${kpi("Daily run rate",fK(runRate),
        `target ${fK(DAILY_TARGET)}/day · ${runRatePct}% of daily target`,
        runRatePct>=100?"up":"wn",
        runRatePct>=100?"↑ Ahead of pace":"↓ Below required","gn",
        {color:runRatePct>=100?"var(--grn)":"var(--red)",prog:Math.min(runRatePct,100),progColor:runRatePct>=100?"#1D9E75":"#E24B4A"})}
      ${kpi("Cost per patient",f(costPerPt),
        `variable + fixed share · ${patients} patients`,
        costPerPt<avgTicket?"up":"wn",
        costPerPt<avgTicket?"↑ Margin positive":"↓ Below cost","rd",
        {color:costPerPt<avgTicket?"var(--grn)":"var(--red)"})}
    </div>

    <div class="panel" style="margin-bottom:12px">
      <div class="ptl">Revenue trend <span class="ptag">${pLabel.toLowerCase()} vs previous period</span></div>
      <div class="cw t"><canvas id="c-rv"></canvas></div>
    </div>

    <div class="g3" style="margin-bottom:12px">
      <div class="panel">
        <div class="ptl">P&L breakdown <span class="ptag">${pLabel.toLowerCase()}</span></div>
        <div class="fr"><span style="font-weight:500">Gross revenue</span><span class="fv ft">${fK(base)}</span></div>
        <div class="fr"><span style="color:var(--ink3);padding-left:10px">− Reagents &amp; consumables (25%)</span><span class="fv fn">−${fK(variable)}</span></div>
        <div class="fr" style="border-top:0.5px dashed var(--brd);margin-top:4px;padding-top:8px"><span style="color:var(--ink3)">Gross contribution</span><span class="fv" style="color:var(--teal)">${fK(base-variable)}</span></div>
        <div class="fr"><span style="color:var(--ink3);padding-left:10px">− Salaries</span><span class="fv fn">−${fK(Math.round(115000*days/26))}</span></div>
        <div class="fr"><span style="color:var(--ink3);padding-left:10px">− Rent</span><span class="fv fn">−${fK(Math.round(40000*days/26))}</span></div>
        <div class="fr"><span style="color:var(--ink3);padding-left:10px">− EMI</span><span class="fv fn">−${fK(Math.round(38000*days/26))}</span></div>
        <div class="fr"><span style="color:var(--ink3);padding-left:10px">− Electricity</span><span class="fv fn">−${fK(Math.round(18000*days/26))}</span></div>
        <div class="fr"><span style="color:var(--ink3);padding-left:10px">− Marketing</span><span class="fv fn">−${fK(Math.round(25000*days/26))}</span></div>
        <div class="fr"><span style="color:var(--ink3);padding-left:10px">− Tech</span><span class="fv fn">−${fK(Math.round(5299*days/26))}</span></div>
        <div class="fr total"><span style="font-weight:600">Net profit</span><span class="fv" style="color:${profit>0?"var(--grn)":"var(--red)"};font-size:15px">${profit>=0?"+":""}${fK(profit)}</span></div>
        <div class="fr" style="border-top:none"><span style="color:var(--ink3)">Profit margin</span><span class="fv" style="color:${margin>20?"var(--grn)":margin>10?"var(--amb)":"var(--red)"}">${margin}%</span></div>
        <div class="fr"><span style="color:var(--ink3)">Break-even revenue</span><span class="fv">${fK(Math.round(fixedShare/0.75))}</span></div>
        <div class="fr"><span style="color:var(--ink3)">Cost per patient</span><span class="fv">${f(costPerPt)}</span></div>
      </div>

      <div class="panel" id="rv-tests-panel">
        <div class="ptl">Top tests by revenue <span class="ptag" id="rv-tests-tag">all categories</span></div>
        ${testRevenue.map((t,i)=>`
        <div class="pbl">
          <div class="pbl-top">
            <span>${t.t} <span style="font-size:9px;color:var(--ink3)">${t.cat}</span></span>
            <span style="font-weight:500;color:var(--teal)">${fK(t.v)}</span>
          </div>
          <div class="prog"><div class="progf" style="width:${Math.round(t.v/maxTestRev*100)}%;background:${i===0?"var(--teal)":i===1?"var(--teal2)":i===2?"var(--g2)":"#C8C4B8"}"></div></div>
        </div>`).join("")}
        <div class="fr" style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--brd)">
          <span style="color:var(--ink3)">Total tracked</span><span class="fv">${fK(totalTestRev)}</span>
        </div>
      </div>

      <div class="panel">
        <div class="ptl">Revenue by doctor <span class="ptag">this month</span></div>
        ${docRevenue.map((d,i)=>`
        <div class="doc-row">
          <span style="width:90px;font-size:11px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${d.name}</span>
          <div class="doc-bar-wrap"><div class="doc-bar" style="width:${Math.round(d.v/maxDocRev*100)}%;background:${i===0?"var(--teal)":i===1?"var(--blue)":i===2?"var(--g2)":"#C8C4B8"}"></div></div>
          <span style="font-size:11px;font-family:'DM Mono',monospace;min-width:50px;text-align:right">${fK(d.v)}</span>
        </div>`).join("")}
        <div style="margin-top:10px;padding-top:8px;border-top:0.5px solid var(--brd)">
          <div class="fr"><span style="color:var(--ink3)">Avg per doctor</span><span class="fv">${fK(Math.round(totalDocRev/docRevenue.length))}</span></div>
          <div class="fr"><span style="color:var(--ink3)">Top doctor share</span><span class="fv">${Math.round(docRevenue[0].v/totalDocRev*100)}% of total</span></div>
          <div class="fr"><span style="color:var(--ink3)">Avg per referral</span><span class="fv">${f(Math.round(totalDocRev/docRevenue.reduce((a,d)=>a+d.pts,0)))}</span></div>
        </div>
      </div>
    </div>

    <div class="g3">
      <div class="panel" id="rv-pay-panel">
        <div class="ptl">Payment mode split <span class="ptag" id="rv-pay-tag">${pLabel.toLowerCase()}</span></div>
        <div class="cw s"><canvas id="c-pay"></canvas></div>
        <div id="rv-pay-bars" style="margin-top:10px">
          ${[{l:"Cash",v:cash,p:cashPct,c:"var(--teal)"},{l:"UPI",v:upi,p:upiPct,c:"var(--g2)"},{l:"Card",v:card,p:cardPct,c:"var(--blue)"}].map(x=>`
          <div class="pbl">
            <div class="pbl-top"><span>${x.l}</span><span>${fK(x.v)} (${x.p}%)</span></div>
            <div class="prog"><div class="progf" style="width:${x.p}%;background:${x.c}"></div></div>
          </div>`).join("")}
          <div style="margin-top:8px;font-size:10px;color:var(--ink3)">
            ${upiPct>cashPct?"↑ Digital leads · healthy trend":"→ Cash dominant · encourage UPI"}
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="ptl">Monthly milestones</div>
        ${[
          {l:"Revenue target",v:tgtPct,t:`${fK(MONTHLY_TARGET)}`,c:"var(--teal2)"},
          {l:"Profit target",v:R(40,78),t:"₹3L net",c:"var(--grn)"},
          {l:"Patients/day",v:Math.round(R(38,62)/PATIENT_TARGET*100),t:`${PATIENT_TARGET}/day`,c:"var(--blue)"},
          {l:"TAT compliance",v:R(78,96),t:"≥90%",c:"var(--g2)"}
        ].map(m=>`
        <div class="ms-row">
          <div class="ms-lbl">
            <span>${m.l}</span>
            <span style="color:${m.c}">${m.v}% <span style="color:var(--ink3);font-weight:400">· target ${m.t}</span></span>
          </div>
          <div class="ms-bar"><div class="ms-fill" style="width:${Math.min(m.v,100)}%;background:${m.c}"></div></div>
        </div>`).join("")}
        <div style="margin-top:12px;padding-top:10px;border-top:0.5px solid var(--brd)">
          <div class="fr"><span>Collected so far</span><span class="fv ft">${fK(monthSoFar)}</span></div>
          <div class="fr"><span>Remaining target</span><span class="fv" style="color:var(--ink3)">${fK(MONTHLY_TARGET-monthSoFar)}</span></div>
          <div class="fr"><span>Required per day</span><span class="fv" style="color:${needed<=DAILY_TARGET?"var(--grn)":"var(--red)"}">${fK(needed)}/day</span></div>
          <div class="fr"><span>Break-even daily</span><span class="fv">${fK(Math.round(fixedShare/0.75/30))}/day</span></div>
        </div>
      </div>

      <div class="panel">
        <div class="ptl">Monthly cost structure <span class="ptag">fixed expenses</span></div>
        <div class="cw s"><canvas id="c-cost"></canvas></div>
        <div style="margin-top:10px">
          ${Object.entries(COSTS).map(([k,v])=>`
          <div class="fr"><span>${k}</span><span class="fv">${fK(v)}</span></div>`).join("")}
          <div class="fr total"><span style="font-weight:600">Total fixed/month</span><span class="fv" style="color:var(--red)">−${fK(totalFixed)}</span></div>
          <div class="fr" style="border-top:none"><span style="color:var(--ink3)">Fixed as % of target</span><span class="fv">${Math.round(totalFixed/MONTHLY_TARGET*100)}%</span></div>
          <div class="fr" style="border-top:none"><span style="color:var(--ink3)">Fixed per patient</span><span class="fv">${f(Math.round(totalFixed/PATIENT_TARGET/26))}</span></div>
        </div>
      </div>
    </div>
  </div>`;

  const rvDatasets=[
    {label:pLabel,data:trendData,borderColor:"#0A5548",backgroundColor:"rgba(10,85,72,.08)",fill:true},
    {label:"Previous",data:prevTrend,borderColor:"#D3D1C7",borderDash:[3,3],pointRadius:0}
  ];
  if(!isDay) rvDatasets.push({label:"Daily target",data:trendLabels.map(()=>DAILY_TARGET),borderColor:"#C98420",borderDash:[5,5],pointRadius:0,borderWidth:1.5});
  lineChart("c-rv",trendLabels,rvDatasets,{
    yFmt:v=>v>=100000?"₹"+(v/100000).toFixed(1)+"L":v>=1000?"₹"+(v/1000).toFixed(0)+"K":"₹"+v,
    yLabel:"Revenue (₹)",
    xLabel:isDay?"Hour":days<=7?"Day":days<=31?"Date":"Week",
    legend:{display:true,labels:{font:{size:10},boxWidth:8,padding:6}}
  });
  doughnut("c-pay",["Cash","UPI","Card"],[cash,upi,card],["#0A5548","#C98420","#185FA5"]);
  barChart("c-cost",Object.keys(COSTS),Object.values(COSTS),"#C98420",{yFmt:v=>"₹"+(v/1000).toFixed(0)+"K",yLabel:"Amount (₹)",xLabel:"Category"});

  // Store all computed values for filter updates
  window._rvData = {
    testRevenue, cash, upi, card, cashPct, upiPct, cardPct,
    base, dp, avgTicket, margin, tgtPct, daysLeft, patients, pLabel,
    totalTestRev
  };

  // Re-apply active filters and restore select UI state
  if (_catFilter || _payFilter) renderFiltered();
  if (_catFilter) { const e=document.getElementById("rv-cat"); if(e) { e.value=_catFilter; e.classList.add("factive"); } }
  if (_payFilter) { const e=document.getElementById("rv-pay"); if(e) { e.value=_payFilter; e.classList.add("factive"); } }
}

function renderFiltered() {
  const d = window._rvData;
  if (!d) return;

  // ── Test category filter ─────────────────────────────────────
  const testsEl  = document.getElementById("rv-tests-panel");
  const testsTag = document.getElementById("rv-tests-tag");
  if (testsEl && testsTag) {
    const allowedTests = _catFilter ? (CAT_MAP[_catFilter] || []) : null;
    const filtered = allowedTests
      ? d.testRevenue.filter(t => allowedTests.some(a => t.t.toLowerCase().includes(a.toLowerCase())))
      : d.testRevenue;
    const maxV      = filtered.length ? filtered[0].v : 1;
    const catTotal  = filtered.reduce((a,t) => a+t.v, 0);
    const catShare  = d.totalTestRev > 0 ? Math.round(catTotal/d.totalTestRev*100) : 0;

    testsTag.textContent = _catFilter ? _catFilter : "all categories";

    const header = testsEl.querySelector(".ptl");
    testsEl.innerHTML = "";
    testsEl.appendChild(header);

    if (filtered.length === 0) {
      testsEl.innerHTML += `<div style="padding:16px;text-align:center;font-size:12px;color:var(--ink3)">No tests tracked in this category</div>`;
    } else {
      filtered.forEach((t,i) => {
        testsEl.innerHTML += `
        <div class="pbl">
          <div class="pbl-top"><span>${t.t}</span><span style="font-weight:500;color:var(--teal)">${fK(t.v)}</span></div>
          <div class="prog"><div class="progf" style="width:${Math.round(t.v/maxV*100)}%;background:${i===0?"var(--teal)":i===1?"var(--teal2)":i===2?"var(--g2)":"#C8C4B8"}"></div></div>
        </div>`;
      });
    }

    // Category total row
    if (_catFilter) {
      testsEl.innerHTML += `<div class="cat-total">
        <span>${_catFilter} total</span>
        <strong>${fK(catTotal)} · ${catShare}% of all tests</strong>
      </div>`;
    } else {
      testsEl.innerHTML += `<div class="fr" style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--brd)">
        <span style="color:var(--ink3)">Total tracked</span><span class="fv">${fK(d.totalTestRev)}</span>
      </div>`;
    }
  }

  // ── Payment filter ───────────────────────────────────────────
  const kpi2   = document.getElementById("rv-kpi2");
  const payBars = document.getElementById("rv-pay-bars");
  const payTag  = document.getElementById("rv-pay-tag");
  const cband   = document.getElementById("rv-cband");

  if (kpi2 && payBars) {
    const cashV    = _payFilter==="digital" ? 0 : d.cash;
    const digitalV = _payFilter==="cash"    ? 0 : d.upi + d.card;
    const totalV   = cashV + digitalV;
    const cPct = totalV>0 ? Math.round(cashV/totalV*100)    : 0;
    const dPct = totalV>0 ? Math.round(digitalV/totalV*100) : 0;

    if (payTag) payTag.textContent = _payFilter==="cash"?"Cash only":_payFilter==="digital"?"Digital only":d.pLabel.toLowerCase();

    // Update KPI row 2 — values + subtitles for cash/digital cards
    const cards = kpi2.querySelectorAll(".kc");
    if (cards[0]) {
      cards[0].querySelector(".kv").textContent = fK(cashV);
      cards[0].querySelector(".ks").textContent = _payFilter
        ? `${_payFilter==="digital"?"0":"100"}% shown · physical float`
        : `${d.cashPct}% of ${d.pLabel.toLowerCase()} · reconcile daily`;
    }
    if (cards[1]) {
      cards[1].querySelector(".kv").textContent = fK(digitalV);
      cards[1].querySelector(".ks").textContent = _payFilter
        ? `${_payFilter==="cash"?"0":"100"}% shown · auto-reconciled`
        : `${d.upiPct + d.cardPct}% of ${d.pLabel.toLowerCase()} · auto-reconciled`;
    }

    // Update payment bars
    payBars.innerHTML = [
      {l:"Cash",    v:cashV,    p:cPct, c:"var(--teal)"},
      {l:"Digital", v:digitalV, p:dPct, c:"var(--g2)"}
    ].filter(x => !(_payFilter==="digital"&&x.l==="Cash" || _payFilter==="cash"&&x.l==="Digital")).map(x=>`
      <div class="pbl">
        <div class="pbl-top"><span>${x.l}</span><span>${fK(x.v)} (${x.p}%)</span></div>
        <div class="prog"><div class="progf" style="width:${x.p}%;background:${x.c}"></div></div>
      </div>`).join("")
      + `<div style="margin-top:8px;font-size:10px;color:var(--ink3)">
          ${_payFilter?"Payment filter active — showing partial view":"↑ Digital leads · healthy trend"}
        </div>`;

    // Redraw payment doughnut
    doughnut("c-pay",["Cash","UPI","Card"],
      [_payFilter==="digital"?0:d.cash, _payFilter==="cash"?0:d.upi, _payFilter==="cash"?0:d.card],
      ["#0A5548","#C98420","#185FA5"]);

    // Update context band when payment filter active
    if (cband) {
      const filtAmt = _payFilter==="cash" ? d.cash : _payFilter==="digital" ? d.upi+d.card : d.base;
      const filtShare = Math.round(filtAmt/d.base*100);
      cband.innerHTML = _payFilter ? `
        <span><strong>${fK(filtAmt)}</strong> ${_payFilter} · ${filtShare}% of ${fK(d.base)} total</span>
        <span class="ctx-sep">·</span>
        <span>Avg ticket <strong>${f(d.avgTicket)}</strong></span>
        <span class="ctx-sep">·</span>
        <span>Margin <strong>${d.margin>0?d.margin+"% profit":Math.abs(d.margin)+"% loss"}</strong></span>
        <span class="ctx-sep">·</span>
        <span>Monthly <strong>${d.tgtPct}%</strong> · <strong>${d.daysLeft}</strong> days left</span>
        <span class="ctx-sep">·</span>
        <span style="color:var(--blue)">Payment filter active</span>
      ` : `
        <span><strong>${fK(d.base)}</strong> ${d.pLabel.toLowerCase()}</span><span class="ctx-sep">·</span>
        <span>${d.dp>0?"↑":"↓"}<strong>${Math.abs(d.dp)}%</strong> vs previous</span><span class="ctx-sep">·</span>
        <span>Avg ticket <strong>${f(d.avgTicket)}</strong></span><span class="ctx-sep">·</span>
        <span>Margin <strong>${d.margin>0?d.margin+"% profit":Math.abs(d.margin)+"% loss"}</strong></span><span class="ctx-sep">·</span>
        <span>Monthly <strong>${d.tgtPct}%</strong> · <strong>${d.daysLeft}</strong> days left</span>
      `;
    }
  }

  // Highlight active filter selects with consistent factive class
  ["rv-cat","rv-pay"].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.classList.toggle("factive", !!(el.value));
  });
}
</script>
</body>
</html>
